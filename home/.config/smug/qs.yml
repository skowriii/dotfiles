session: qs

root: /personal/Projects/Applications/QML/ss

before_start:
  - sscli kill

stop:
  - sscli start -a

windows:
  - name: editor
    selected: true
    layout: main-vertical
    commands:
      - $EDITOR .

  - name: shell
    layout: main-vertical
    commands:
      - task project:ss list

  - name: log
    layout: main-vertical
    commands:
      - qs -c ss

  - name: webui
    layout: main-vertical
    commands:
      - git webui

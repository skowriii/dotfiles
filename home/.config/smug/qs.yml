session: qs

root: ~/dotfiles/home/.config/quickshell/ss

windows:
  - name: editor
    selected: true
    layout: main-vertical
    commands:
      - $EDITOR .

  - name: shell
    layout: main-vertical

  - name: log
    layout: main-vertical
    commands:
      - qs -c ss

  - name: webui
    layout: main-vertical
    commands:
      - git webui
